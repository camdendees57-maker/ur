name: Build Fortnite Aimbot Toggle GUI

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install ldid
          brew install make

      - name: Setup Theos (robust)
        run: |
          export THEOS=/Users/runner/theos
          export THEOS_NO_SDK=1
          mkdir -p $THEOS
          THEOS_NO_SDK=1 bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)" || true
          git clone --recursive --depth 1 https://github.com/theos/theos.git $THEOS || true

      - name: Build Tweak
        run: |
          export THEOS=/Users/runner/theos
          export THEOS_MAKE_PATH=$THEOS/makefiles
          make clean || true
          make package

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: Fortnite-Aimbot-Toggle-GUI
          path: packages/*.deb
