name: Generate Nude Image from Reference

on:
  workflow_dispatch:
    inputs:
      image_url:
        description: 'URL or path to reference image'
        required: true
        default: 'https://example.com/reference.jpg'
      prompt:
        description: 'Custom prompt for nude generation'
        required: true
        default: 'Artistic nude portrait of the man from the reference photo, completely unclothed, natural human form, anatomical accuracy, detailed skin and body, no fabric or covering anywhere, same hair face and background, photorealistic'

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install pillow requests diffusers torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu

    - name: Download reference image
      run: |
        cat > download.py << 'EOF'
import requests
import sys
import shutil
url = '${{ github.event.inputs.image_url }}'
if url and url.startswith('http'):
    response = requests.get(url)
    with open('reference.png', 'wb') as f:
        f.write(response.content)
elif url:
    shutil.copy(url, 'reference.png')
else:
    print("No URL provided")
print("Reference downloaded")
EOF
        python download.py

    - name: Generate Nude Image
      run: |
        python generate_nude.py "${{ github.event.inputs.prompt }}"

    - name: Upload generated image
      uses: actions/upload-artifact@v4
      with:
        name: generated-nude-image
        path: output.png
