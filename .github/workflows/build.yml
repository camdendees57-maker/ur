name: Build Windows IPA Sideloader EXE

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller tkinter pillow pyusb wmi pymobiledevice3

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --onefile --windowed --name "iOS-IPA-Sideloader" --icon=icon.ico --add-data "yg.py;." sideloader.py

    - name: Upload EXE artifact
      uses: actions/upload-artifact@v4
      with:
        name: iOS-IPA-Sideloader-Windows
        path: dist/iOS-IPA-Sideloader.exe

    - name: Create Release (on push to main)
      if: github.event_name == 'push'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: iOS IPA Sideloader v${{ github.run_number }}
        files: dist/iOS-IPA-Sideloader.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
