name: Build arm64 .so with ImGui

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r26d

    - name: Build libmoneyhack.so (arm64)
      run: |
        cd jni
        $ANDROID_NDK_ROOT/ndk-build APP_ABI=arm64-v8a APP_BUILD_SCRIPT=Android.mk NDK_PROJECT_PATH=..
        mkdir -p ../libs/arm64-v8a
        cp ../libs/arm64-v8a/libmoneyhack.so ../libs/arm64-v8a/ || echo "Build output ready"

    - name: Upload .so artifact
      uses: actions/upload-artifact@v4
      with:
        name: libmoneyhack-arm64
        path: libs/arm64-v8a/libmoneyhack.so