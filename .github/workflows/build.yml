name: Build Fortnite Aimbot Toggle GUI

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Theos
        run: |
          export THEOS=/Users/runner/theos
          mkdir -p $THEOS
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)" -- --no-sdk
      
      - name: Build
        run: |
          export THEOS=/Users/runner/theos
          export THEOS_MAKE_PATH=$THEOS/makefiles
          make package
      
      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: Fortnite-Aimbot-Toggle-GUI
          path: packages/*.deb
